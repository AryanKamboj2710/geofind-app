<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoFind - Lost & Found</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>GeoFind</h1>
        <div class="header-actions">
            <div class="auth-buttons" id="authSection">
                <!-- Dynamically populated by JS based on auth state -->
                <button id="loginBtn">Log In</button>
                <button id="signupBtn" style="background: var(--primary-color); border-color: var(--primary-color);">Sign Up</button>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Recent Items</h2>
                <button id="reportBtn" class="btn-primary" style="display: none;">Report Lost/Found Item</button>
            </div>
            <div class="sidebar-content" id="feedContainer">
                <!-- Items populated here -->
                <p style="color: var(--text-muted); text-align: center;">Loading items...</p>
            </div>
        </div>
        <div class="map-container">
            <div id="map"></div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="authTitle">Log In</h3>
                <button class="close-btn" id="closeAuthModal">&times;</button>
            </div>
            <form id="authForm">
                <div class="form-group" id="nameGroup" style="display: none;">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary" id="authSubmitBtn">Log In</button>
            </form>
            <div class="toggle-form">
                <p id="authToggleText">Don't have an account? <span id="toggleAuthMode">Sign Up</span></p>
            </div>
        </div>
    </div>

    <!-- Report Item Modal -->
    <div class="modal-overlay" id="reportModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Report an Item</h3>
                <button class="close-btn" id="closeReportModal">&times;</button>
            </div>
            <form id="reportForm">
                <p style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1rem;">Click on the map to set the exact location, then fill out this form.</p>
                <div class="form-group">
                    <label for="itemStatus">Status</label>
                    <select id="itemStatus" required>
                        <option value="lost">I lost something</option>
                        <option value="found">I found something</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="itemTitle">Item Title</label>
                    <input type="text" id="itemTitle" required placeholder="e.g. Golden Retriever, Blue Wallet">
                </div>
                <div class="form-group">
                    <label for="itemDescription">Description</label>
                    <textarea id="itemDescription" rows="3" required placeholder="Provide distinguishing details..."></textarea>
                </div>
                <div class="form-group">
                    <label for="itemContact">Contact Number</label>
                    <input type="tel" id="itemContact" required placeholder="e.g. +1 234 567 890">
                </div>
                <div style="display: flex; gap: 1rem; margin-bottom: 1.25rem;">
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label>Latitude</label>
                        <input type="text" id="itemLat" readonly required>
                    </div>
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label>Longitude</label>
                        <input type="text" id="itemLng" readonly required>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Submit Report</button>
            </form>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
